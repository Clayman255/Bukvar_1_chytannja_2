<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Впізнай "ь"</title>
  <style>
    :root {
      --bg: #fbf6ee;
      --card: #ffffff;
      --accent: #ffd84d;
      --shadow: rgba(0, 0, 0, .10);
      --radius: 18px;
      --bad: #ef4444;
      --good: #22c55e;
      --text-main: #2c3e50;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      max-width: 800px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2.5rem;
      color: #d35400;
    }

    .task-desc {
      font-size: 1.5rem;
      font-weight: 500;
      background: #fff;
      padding: 15px 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: inline-block;
    }

    .toolbar {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      border: 0;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 28px;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 4px 10px var(--shadow);
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:active { transform: scale(0.95); }

    /* Оновлена область гри */
    .game-area {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
    }

    /* ЗМІНА: Grid для 4 колонок, щоб вмістити 8 карток (2 ряди по 4) */
    .board {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 20px;
      justify-content: center;
      padding: 20px;
    }

    /* Стиль картки слова */
    .item {
      width: 200px; /* Трохи зменшив ширину, щоб вмістити 4 в ряд */
      height: 240px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
      background: #fff;
      border-radius: 20px;
      padding: 15px;
      border: 4px solid transparent; 
      box-shadow: 0 8px 15px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .item:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.1);
    }

    .item img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      pointer-events: none;
      margin-bottom: 10px;
    }

    .item-label {
      font-family: Arial, Helvetica, sans-serif; 
      font-size: 24px; /* Трохи зменшив шрифт для довгих слів */
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    /* Анімація помилки */
    @keyframes shake {
      0%, 100% { transform: translateX(0); border-color: transparent; }
      25% { transform: translateX(-8px); border-color: var(--bad); background-color: #fee2e2; }
      75% { transform: translateX(8px); border-color: var(--bad); background-color: #fee2e2; }
    }

    .item.error {
      animation: shake 0.5s ease-in-out;
    }

    /* Стиль правильної відповіді */
    .item.success {
      border-color: var(--good);
      background-color: #dcfce7;
      pointer-events: none; 
      transform: scale(1.05);
    }

    .win-message {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 80px;
      border-radius: 30px;
      font-size: 3rem;
      font-weight: bold;
      color: #16a34a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      z-index: 100;
      text-align: center;
      border: 5px solid #16a34a;
    }
    
    /* Адаптивність для мобільних */
    @media (max-width: 900px) {
      .board {
        grid-template-columns: repeat(3, auto);
      }
    }
    @media (max-width: 700px) {
      .board {
        grid-template-columns: repeat(2, auto);
      }
      .item {
         width: 160px;
         height: 200px;
      }
      .item img {
          width: 100px;
          height: 100px;
      }
    }
    @media (max-width: 400px) {
      .board {
        grid-template-columns: repeat(1, auto);
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Впізнай "ь"</h1>
  <div class="task-desc">
    Натисни на слова, у яких знак м'якшення знаходиться у <b>кінці</b>.
  </div>
</header>

<div class="toolbar">
  <button id="btnSound" title="Озвучити завдання">🔊</button>
  <button id="btnReset" title="Почати знову">🔄</button>
</div>

<div class="game-area">
  <div class="board" id="board">
    </div>
</div>

<div id="winMsg" class="win-message">Молодець!</div>

<audio id="audioTask" src="zv.mp3"></audio>

<audio id="soundCorrect" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio> 
<audio id="soundWrong" src="https://actions.google.com/sounds/v1/cartoon/clank_car_crash.ogg"></audio>

<script>
  // Дані про слова:
  // 1-5: правильні (ь в кінці)
  // 6-8: неправильні (ь всередині)
  const itemsData = [
    { id: 1, img: '1.png', text: 'Олівець', correct: true },
    { id: 2, img: '2.png', text: 'Заєць', correct: true },
    { id: 3, img: '3.png', text: 'Хлопець', correct: true },
    { id: 4, img: '4.png', text: 'Пень', correct: true },
    { id: 5, img: '5.png', text: 'Камінь', correct: true },
    { id: 6, img: '6.png', text: 'Різьбяр', correct: false },
    { id: 7, img: '7.png', text: 'Кільце', correct: false },
    { id: 8, img: '8.png', text: 'Скринька', correct: false }
  ];

  const board = document.getElementById('board');
  const audioTask = document.getElementById('audioTask');
  const winMsg = document.getElementById('winMsg');
  const soundCorrect = document.getElementById('soundCorrect');
  // const soundWrong = document.getElementById('soundWrong'); 

  let correctCount = 0;
  // Рахуємо, скільки всього правильних відповідей у масиві (має бути 5)
  const totalCorrect = itemsData.filter(i => i.correct).length;

  function initGame() {
    board.innerHTML = '';
    winMsg.style.display = 'none';
    correctCount = 0;

    // Перемішуємо масив і створюємо елементи
    [...itemsData].sort(() => 0.5 - Math.random()).forEach(item => {
      const el = document.createElement('div');
      el.className = 'item';
      
      // Створюємо HTML картки: картинка + текст
      el.innerHTML = `
        <img src="${item.img}" alt="${item.text}">
        <div class="item-label">${item.text}</div>
      `;

      // Додаємо обробку кліку
      el.addEventListener('click', () => handleItemClick(el, item));
      
      board.appendChild(el);
    });
  }

  function handleItemClick(element, itemData) {
    // Якщо вже відгадано (зелене), нічого не робимо
    if (element.classList.contains('success')) return;

    if (itemData.correct) {
      // Правильна відповідь
      element.classList.add('success');
      soundCorrect.currentTime = 0;
      soundCorrect.play().catch(() => {}); 
      
      correctCount++;
      
      // Перевірка перемоги
      if (correctCount === totalCorrect) {
        setTimeout(() => {
          winMsg.style.display = 'block';
        }, 300);
      }
    } else {
      // Неправильна відповідь
      element.classList.add('error');
      // soundWrong.play(); 
      
      // Прибираємо клас помилки після анімації
      setTimeout(() => {
        element.classList.remove('error');
      }, 500);
    }
  }

  // Кнопка звуку
  document.getElementById('btnSound').onclick = () => {
    audioTask.currentTime = 0;
    audioTask.play().catch(e => console.log("Audio play error", e));
  };

  // Кнопка рестарту
  document.getElementById('btnReset').onclick = initGame;

  // Запуск гри при завантаженні
  initGame();
</script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
