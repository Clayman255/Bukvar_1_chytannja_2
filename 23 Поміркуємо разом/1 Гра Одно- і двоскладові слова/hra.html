<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра: Розподіли слова</title>
    <style>
        :root {
            --bg: #fdf5e6; /* Світло-кремовий */
            --accent: #5d4037; /* Темно-коричневий для акцентів */
            --success-bg: #ffffff;
            --success-border: #22c55e;
            --success-text: #166534;
            --text: #000000;
            --title-color: #4e342e;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--title-color);
            margin-bottom: 15px;
            text-align: center;
        }

        .instruction-container {
            background: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 5px solid var(--accent);
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--title-color);
        }

        /* Зафіксована висота, щоб блок не зменшувався і не штовхав верстку */
        .words-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center; /* Центрування вмісту всередині фіксованої висоти */
            gap: 15px;
            margin-bottom: 40px;
            height: 250px; /* Фіксована висота блоку */
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            border: 2px dashed #bcaaa4;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
        }

        .word-card {
            background: var(--card-bg);
            border: 2px solid #d7ccc8;
            border-radius: 12px;
            padding: 15px 30px;
            font-size: 2rem; 
            font-weight: bold;
            color: #000;
            cursor: grab;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
        }

        .word-card:active { cursor: grabbing; }
        .word-card.dragging { opacity: 0.5; transform: scale(0.9); }

        @keyframes shake-blink {
            0%, 100% { border-color: #d7ccc8; transform: translateX(0); }
            25% { border-color: #e74c3c; transform: translateX(-5px); }
            75% { border-color: #e74c3c; transform: translateX(5px); }
        }

        .shake { animation: shake-blink 0.4s ease-in-out; }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .column {
            background: #ffffff;
            border: 3px solid #d7ccc8;
            border-radius: 25px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: background 0.3s;
        }

        .column.drag-over {
            background: #fdfcf0;
            border-color: var(--accent);
        }

        .column-title {
            font-size: 1.8rem;
            color: var(--title-color);
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px solid #5d403733;
            width: 100%;
            padding-bottom: 10px;
        }

        .success-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--success-bg);
            color: var(--success-text);
            border: 5px solid var(--success-border);
            padding: 30px 60px;
            border-radius: 50px;
            font-size: 3.5rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .restart-btn {
            display: none; /* З'являється після виконання */
            margin-top: 40px;
            padding: 12px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:hover { background-color: #f0f0f0; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="game-title">Розподіли</div>

    <div class="instruction-container">
        Розподіли слова на односкладові та двоскладові.
    </div>

    <div class="words-pool" id="pool"></div>

    <div class="game-layout">
        <div class="column" id="one-syllable" data-type="1">
            <div class="column-title">Односкладові слова</div>
        </div>

        <div class="column" id="two-syllables" data-type="2">
            <div class="column-title">Двоскладові слова</div>
        </div>
    </div>

    <div id="win-banner" class="success-message">Вдалося! 🎉</div>

    <button id="restart-btn" class="restart-btn" onclick="restartGame()">Ще раз</button>

    <script>
        const wordsData = [
            { text: 'мама', syllables: 2 },
            { text: 'сік', syllables: 1 },
            { text: 'кіт', syllables: 1 },
            { text: 'друг', syllables: 1 },
            { text: 'поле', syllables: 2 },
            { text: 'тато', syllables: 2 },
            { text: 'дощ', syllables: 1 },
            { text: 'осінь', syllables: 2 },
            { text: 'щастя', syllables: 2 },
            { text: 'лев', syllables: 1 }
        ];

        const pool = document.getElementById('pool');
        const columns = document.querySelectorAll('.column');
        const winBanner = document.getElementById('win-banner');
        const restartBtn = document.getElementById('restart-btn');
        let draggedElement = null;

        function init() {
            pool.innerHTML = '';
            const shuffled = [...wordsData].sort(() => Math.random() - 0.5);
            
            shuffled.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.textContent = word.text;
                card.draggable = true;
                card.dataset.syllables = word.syllables;
                card.id = 'word-' + index;

                card.addEventListener('dragstart', dragStart);
                card.addEventListener('dragend', dragEnd);
                
                pool.appendChild(card);
            });
        }

        function restartGame() {
            columns.forEach(column => {
                const title = column.querySelector('.column-title');
                column.innerHTML = '';
                column.appendChild(title);
            });
            winBanner.style.display = 'none';
            restartBtn.style.display = 'none';
            init();
        }

        function dragStart() {
            draggedElement = this;
            setTimeout(() => this.classList.add('dragging'), 0);
        }

        function dragEnd() {
            this.classList.remove('dragging');
            draggedElement = null;
            checkWin();
        }

        columns.forEach(column => {
            column.addEventListener('dragover', e => {
                e.preventDefault();
                column.classList.add('drag-over');
            });

            column.addEventListener('dragleave', () => {
                column.classList.remove('drag-over');
            });

            column.addEventListener('drop', e => {
                e.preventDefault();
                column.classList.remove('drag-over');
                
                const targetSyllables = parseInt(column.dataset.type);
                const wordSyllables = parseInt(draggedElement.dataset.syllables);

                if (targetSyllables === wordSyllables) {
                    column.appendChild(draggedElement);
                } else {
                    draggedElement.classList.add('shake');
                    setTimeout(() => {
                        draggedElement.classList.remove('shake');
                    }, 400);
                }
            });
        });

        pool.addEventListener('dragover', e => e.preventDefault());
        pool.addEventListener('drop', () => {
            if (draggedElement) pool.appendChild(draggedElement);
        });

        function checkWin() {
            const remaining = pool.querySelectorAll('.word-card').length;
            if (remaining === 0) {
                winBanner.style.display = 'block';
                restartBtn.style.display = 'block';
                setTimeout(() => {
                    winBanner.style.display = 'none';
                }, 5000);
            }
        }

        init();
    </script>
</body>
</html>
