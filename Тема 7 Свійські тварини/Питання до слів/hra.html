<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра: Який? Яка? Яке? Які?</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            position: relative;
        }

        .game-title {
            font-size: 300%;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }

        .instruction-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .instruction-text {
            font-size: 200%;
            font-weight: bold;
            color: #2c3e50;
        }

        .game-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px;
            width: 100%;
            max-width: 1300px;
            position: relative;
        }

        #line-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }

        .image-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: min-content;
        }

        .words-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
            align-items: center;
        }

        .drop-zone {
            background: #f9f9f9;
            border: 3px solid #bdc3c7;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .drop-zone.selected { border-color: #3498db; background: #ebf5fb; }
        .drop-zone.correct { border-color: #2ecc71; background: #e8f8f5; cursor: default; }

        .animal-img {
            width: 200px; 
            height: 200px;
            object-fit: contain;
            pointer-events: none;
        }

        .word-card {
            background: #ffffff;
            color: #000000;
            border: 3px solid #3498db;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            width: 100%;
            justify-content: center;
        }

        .word-card.selected { 
            background: #3498db; 
            color: white; 
        }

        .word-card.matched {
            border-color: #2ecc71;
            opacity: 0.8;
            cursor: default;
        }

        .audio-btn {
            background: #ff9f43;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .success-message {
            display: none;
            color: #27ae60;
            font-size: 2.5rem;
            margin-top: 30px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="line-canvas"></canvas>

    <div class="game-title">Який? Яка? Яке? Які?</div>

    <div class="instruction-container">
        <button class="audio-btn" onclick="playSound('zav.mp3')">🔊</button>
        <div class="instruction-text">Утвори пару із зображення та слова.</div>
    </div>

    <div class="game-layout" id="main-layout">
        <div class="image-column" id="left-targets"></div>
        <div class="words-column">
            <div id="words-container" style="display: flex; flex-direction: column; gap: 20px; width: 100%;"></div>
            <div id="win-text" class="success-message">Чудово! Правильно! 🎉</div>
        </div>
        <div class="image-column" id="right-targets"></div>
    </div>

    <script>
        const data = [
            { id: 1, img: '1.png', word: 'молодий', aImg: '11.mp3', aWord: '1.mp3' },
            { id: 2, img: '2.png', word: 'ряба', aImg: '22.mp3', aWord: '2.mp3' },
            { id: 3, img: '3.png', word: 'маленьке', aImg: '33.mp3', aWord: '3.mp3' },
            { id: 4, img: '4.png', word: 'пискляві', aImg: '44.mp3', aWord: '4.mp3' }
        ];

        let selectedId = null;
        let selectedType = null;
        let matchedCount = 0;
        let connections = [];

        const canvas = document.getElementById('line-canvas');
        const ctx = canvas.getContext('2d');

        function playSound(file) {
            new Audio(file).play().catch(() => {});
        }

        window.onload = () => {
            initGame();
            resizeCanvas();
            setTimeout(() => playSound('zav.mp3'), 500);
        };

        window.onresize = resizeCanvas;
        window.onscroll = drawArrows;

        function resizeCanvas() {
            canvas.width = document.documentElement.scrollWidth;
            canvas.height = document.documentElement.scrollHeight;
            drawArrows();
        }

        function initGame() {
            const leftCol = document.getElementById('left-targets');
            const rightCol = document.getElementById('right-targets');
            const wordsCol = document.getElementById('words-container');

            data.forEach((item, index) => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.id = `target-${item.id}`;
                zone.onclick = () => handleItemClick(item.id, 'target');
                zone.innerHTML = `
                    <img src="${item.img}" class="animal-img">
                    <button class="audio-btn" onclick="event.stopPropagation(); playSound('${item.aImg}')">🔊</button>
                `;
                if (index < 2) leftCol.appendChild(zone);
                else rightCol.appendChild(zone);
            });

            const shuffled = [...data].sort(() => Math.random() - 0.5);
            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.id = `word-${item.id}`;
                card.onclick = () => handleItemClick(item.id, 'word');
                card.innerHTML = `
                    <button class="audio-btn" onclick="event.stopPropagation(); playSound('${item.aWord}')">🔊</button>
                    <span>${item.word}</span>
                `;
                wordsCol.appendChild(card);
            });
        }

        function handleItemClick(id, type) {
            const el = document.getElementById(`${type}-${id}`);
            if (el.classList.contains('matched') || el.classList.contains('correct')) return;

            if (selectedId === id && selectedType === type) {
                clearSelection();
                return;
            }

            if (!selectedType || selectedType === type) {
                clearSelection();
                selectedId = id;
                selectedType = type;
                el.classList.add('selected');
            } 
            else {
                if (selectedId === id) {
                    const wordEl = document.getElementById(`word-${id}`);
                    const targetEl = document.getElementById(`target-${id}`);
                    
                    wordEl.classList.remove('selected');
                    wordEl.classList.add('matched');
                    targetEl.classList.remove('selected');
                    targetEl.classList.add('correct');
                    
                    connections.push({ wordId: id, targetId: id });
                    matchedCount++;
                    clearSelection();
                    drawArrows();

                    if (matchedCount === data.length) {
                        document.getElementById('win-text').style.display = 'block';
                    }
                } else {
                    clearSelection();
                    selectedId = id;
                    selectedType = type;
                    el.classList.add('selected');
                }
            }
        }

        function clearSelection() {
            document.querySelectorAll('.word-card, .drop-zone').forEach(el => el.classList.remove('selected'));
            selectedId = null;
            selectedType = null;
        }

        function drawArrows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';

            connections.forEach(conn => {
                const wEl = document.getElementById(`word-${conn.wordId}`);
                const tEl = document.getElementById(`target-${conn.targetId}`);
                
                const wRect = wEl.getBoundingClientRect();
                const tRect = tEl.getBoundingClientRect();

                // Координати слова (центральна точка ближньої грані)
                let wordX;
                const wordCenterY = wRect.top + wRect.height / 2 + window.scrollY;

                // Координати малюнка (центральна точка ближньої грані)
                let targetX;
                const targetCenterY = tRect.top + tRect.height / 2 + window.scrollY;

                if (tRect.left < wRect.left) {
                    // Малюнок зліва (ліва колонка)
                    targetX = tRect.right + window.scrollX;
                    wordX = wRect.left + window.scrollX;
                } else {
                    // Малюнок справа (права колонка)
                    targetX = tRect.left + window.scrollX;
                    wordX = wRect.right + window.scrollX;
                }

                ctx.beginPath();
                ctx.moveTo(targetX, targetCenterY);
                ctx.lineTo(wordX, wordCenterY);
                ctx.stroke();

                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.arc(targetX, targetCenterY, 6, 0, Math.PI * 2);
                ctx.arc(wordX, wordCenterY, 6, 0, Math.PI * 2);
                ctx.fill();
            });
        }
    </script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
