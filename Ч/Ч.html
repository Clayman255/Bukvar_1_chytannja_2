<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Знайди букву "ч"</title>
  <style>
    :root {
      --bg: #fbf6ee;
      --card: #ffffff;
      --accent: #ffd84d;
      --shadow: rgba(0, 0, 0, .10);
      --bad: #ef4444;
      --good: #22c55e;
      --text-main: #2c3e50;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      max-width: 800px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2.5rem;
      color: #d35400;
    }

    .task-desc {
      font-size: 1.5rem;
      font-weight: 500;
      background: #fff;
      padding: 15px 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: inline-block;
    }

    .toolbar {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      border: 0;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 28px;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 4px 10px var(--shadow);
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:active { transform: scale(0.95); }

    .game-area {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 30px;
      justify-content: center;
      padding: 20px;
    }

    .item {
      width: 220px; 
      height: 240px;
      cursor: pointer;
      background: #fff;
      border-radius: 20px;
      padding: 15px;
      border: 4px solid transparent; 
      box-shadow: 0 8px 15px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
    }

    .item:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.1);
    }

    .item img {
      width: 182px;
      height: 182px;
      object-fit: contain;
      pointer-events: none;
      margin-bottom: 10px;
    }

    .item-label {
      font-size: 32px; 
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); border-color: transparent; }
      25% { transform: translateX(-8px); border-color: var(--bad); background-color: #fee2e2; }
      75% { transform: translateX(8px); border-color: var(--bad); background-color: #fee2e2; }
    }

    .item.error {
      animation: shake 0.5s ease-in-out;
    }

    .item.success {
      border-color: var(--good);
      background-color: #dcfce7;
      pointer-events: none; 
      transform: scale(1.05);
    }

    .win-message {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 80px;
      border-radius: 30px;
      font-size: 3rem;
      font-weight: bold;
      color: #16a34a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      z-index: 100;
      text-align: center;
      border: 5px solid #16a34a;
    }
    
    @media (max-width: 800px) {
      .board {
        grid-template-columns: repeat(2, auto);
      }
    }
    @media (max-width: 500px) {
      .board {
        grid-template-columns: repeat(1, auto);
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Знайди слово з буквою "ч"</h1>
  <div class="task-desc">
    Натисни на слова, у яких є буква <b>"ч"</b>.
  </div>
</header>

<div class="toolbar">
  <button id="btnSound" title="Озвучити завдання">🔊</button>
  <button id="btnReset" title="Почати знову">🔄</button>
</div>

<div class="game-area">
  <div class="board" id="board"></div>
</div>

<div id="winMsg" class="win-message">Молодець!</div>

<audio id="audioTask" src="au.mp3"></audio>
<audio id="soundCorrect" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
<audio id="soundWrong" src="https://actions.google.com/sounds/v1/cartoon/clank_car_crash.ogg"></audio>

<script>
  // Виправлені назви файлів згідно з вашим списком (1.png, 2.png і т.д.)
  const itemsData = [
    { id: 1, img: '1.png', text: 'чапля', correct: true },
    { id: 2, img: '2.png', text: 'черепаха', correct: true },
    { id: 3, img: '3.png', text: 'часник', correct: true },
    { id: 4, img: '4.png', text: 'чорнобривці', correct: true },
    { id: 5, img: '5.png', text: 'чашка', correct: true },
    { id: 6, img: '6.png', text: 'черевики', correct: true },
    { id: 7, img: '7.png', text: 'гарбуз', correct: false },
    { id: 8, img: '8.png', text: 'гусак', correct: false },
    { id: 9, img: '9.png', text: 'качка', correct: true }
  ];

  const board = document.getElementById('board');
  const audioTask = document.getElementById('audioTask');
  const winMsg = document.getElementById('winMsg');
  const soundCorrect = document.getElementById('soundCorrect');
  const soundWrong = document.getElementById('soundWrong');

  let correctCount = 0;
  const totalCorrect = itemsData.filter(i => i.correct).length;

  function initGame() {
    board.innerHTML = '';
    winMsg.style.display = 'none';
    correctCount = 0;

    [...itemsData].sort(() => 0.5 - Math.random()).forEach(item => {
      const el = document.createElement('div');
      el.className = 'item';
      
      el.innerHTML = `
        <img src="${item.img}" alt="${item.text}">
        <div class="item-label">${item.text}</div>
      `;

      el.addEventListener('click', () => handleItemClick(el, item));
      board.appendChild(el);
    });
  }

  function handleItemClick(element, itemData) {
    if (element.classList.contains('success')) return;

    if (itemData.correct) {
      element.classList.add('success');
      soundCorrect.currentTime = 0;
      soundCorrect.play().catch(() => {});
      
      correctCount++;
      if (correctCount === totalCorrect) {
        setTimeout(() => {
          winMsg.style.display = 'block';
        }, 300);
      }
    } else {
      element.classList.add('error');
      soundWrong.currentTime = 0;
      soundWrong.play().catch(() => {});
      setTimeout(() => {
        element.classList.remove('error');
      }, 500);
    }
  }

  document.getElementById('btnSound').onclick = () => {
    audioTask.currentTime = 0;
    audioTask.play().catch(e => console.log("Audio play error", e));
  };

  document.getElementById('btnReset').onclick = initGame;

  initGame();
</script>
</body>
</html>
