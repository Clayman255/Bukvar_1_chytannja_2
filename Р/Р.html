<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Відгадай!</title>
  <style>
    :root{
      --bg:#fbf6ee;
      --card:#fff;
      --accent:#ffd84d;
      --shadow:rgba(0,0,0,.10);
      --bad:#ef4444;
      --good:#22c55e;
      --text:#2c3e50;
      --orange:#d35400;
      --line:rgba(44,62,80,.10);
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
      padding:10px;
      overflow-x:hidden;
    }

    h1{
      margin:0 0 8px;
      font-size:2rem;
      color:var(--orange);
      text-align:center;
    }

    .task{
      font-size:1.1rem;
      font-weight:700;
      background:#fff;
      padding:8px 15px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
      display:inline-flex;
      align-items:center;
      gap:10px;
      text-align:center;
      margin-bottom:14px;
    }

    .snd{
      border:0;
      background:var(--accent);
      width:36px;
      height:36px;
      border-radius:50%;
      box-shadow:0 3px 6px var(--shadow);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      flex:0 0 auto;
    }
    .snd:active{transform:scale(.98)}

    /* --- MAIN LAYOUT GRID --- */
    .wrap{
      width:100%;
      max-width:1600px;
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }
    @media (min-width:1100px){
      .wrap{
        grid-template-columns: 1fr 1.05fr 1fr;
        align-items:start;
      }
    }

    /* --- RIDDLES --- */
    .riddles-col{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .riddle{
      border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.05);
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:250px;
    }

    .rtop{
      display:flex;
      gap:10px;
      align-items:flex-start;
    }

    .rtext{
      font-size:16px;
      line-height:1.25;
      font-weight:700;
      white-space:pre-line;
      width:100%;
    }

    .drop{
      border-radius:14px;
      border:2px dashed rgba(44,62,80,.25);
      background:rgba(255,216,77,.10);
      width:100%;
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s;
      min-height:150px;
    }
    .drop.over{border-color:rgba(34,197,94,.65); background:rgba(34,197,94,.10);}
    .drop.locked{border-style:solid; border-color:rgba(34,197,94,.55); background:rgba(34,197,94,.10);}

    .chip{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      box-sizing:border-box;
    }
    .chip img{
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      max-height:220px;
    }
    .chip.ok{cursor:default;}
    .chip.bad{animation:shake .45s ease-in-out; filter: sepia(1) hue-rotate(-50deg) saturate(3);}

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-8px)}
      75%{transform:translateX(8px)}
    }

    /* --- BANK (CENTER, 2x2 centered) --- */
    .bank-wrapper{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:6px 0;
    }

    .bank{
      width:100%;
      max-width:560px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      justify-items:center;
      align-items:center;
    }

    .item{
      width:240px;
      height:240px;
      border-radius:22px;
      background:#fff;
      box-shadow:0 12px 24px rgba(0,0,0,.14);
      border:5px solid #fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:grab;
      user-select:none;
      padding:14px;
      box-sizing:border-box;
      transition: transform .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .item:hover{transform:scale(1.06); z-index:5;}
    .item:active{cursor:grabbing; transform:scale(0.96);}
    .item img{width:100%;height:100%;object-fit:contain;pointer-events:none;}
    .item.used{opacity:.10; filter:grayscale(1); cursor:default; transform:none; box-shadow:none;}

    @media (max-width:600px){
      .bank{max-width:420px; gap:14px;}
      .item{width:44vw;height:44vw;max-width:200px;max-height:200px;}
      .chip img{max-height:200px;}
    }

    /* --- WIN MESSAGE & RESTART --- */
    .win-message{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:rgba(255,255,255,.98);
      color:#22c55e;
      border:5px solid #22c55e;
      padding:28px 44px;
      font-size:2.6rem;
      font-weight:900;
      border-radius:40px;
      box-shadow:0 20px 60px rgba(0,0,0,0.30);
      z-index:1000;
      flex-direction:row;
      align-items:center;
      justify-content:center;
      gap:18px;
      animation: popIn .5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .restart-btn{
      background:#22c55e;
      color:#fff;
      border:none;
      border-radius:50%;
      width:60px;
      height:60px;
      font-size:32px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: transform .3s ease, background .3s;
      box-shadow:0 5px 15px rgba(34,197,94,.4);
    }
    .restart-btn:hover{background:#16a34a; transform: rotate(180deg) scale(1.1);}

    @keyframes popIn{
      0%{transform:translate(-50%,-50%) scale(.5); opacity:0;}
      100%{transform:translate(-50%,-50%) scale(1); opacity:1;}
    }

    @media (max-width:1100px){
      .win-message{font-size:2rem; padding:20px 30px; width:85%; flex-direction:column;}
    }
  </style>
</head>

<body>
  <h1>Відгадай!</h1>

  <div class="task">
    <button class="snd" data-a="zv0" title="🔊">🔊</button>
    <span>Розмісти зображення відгадки біля загадки.</span>
  </div>

  <div class="wrap">
    <section id="riddles-left" class="riddles-col"></section>

    <section class="bank-wrapper">
      <div class="bank" id="bank"></div>
    </section>

    <section id="riddles-right" class="riddles-col"></section>
  </div>

  <div id="winMsg" class="win-message">
    <span>Ура! Все вдалося!</span>
    <button id="btnRestart" class="restart-btn" title="Зіграти ще раз">↻</button>
  </div>

  <!-- AUDIO -->
  <audio id="zv0" src="zv0.mp3"></audio>
  <audio id="au1" src="au1.mp3"></audio>
  <audio id="au2" src="au2.mp3"></audio>
  <audio id="au3" src="au3.mp3"></audio>
  <audio id="au4" src="au4.mp3"></audio>

  <audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
  <audio id="no" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
  // 4 riddles, NO numbering
  const riddlesData = [
    {
      id: 1,
      audioId: "au1",
      text:
`На однім кінці – дивак,
А на другому – черв’як.
Увесь день на черв’яка
Всі надії в дивака.`,
      answerImg: "im1.png"
    },
    {
      id: 2,
      audioId: "au2",
      text:
`На собі я ношу дім,
Від хижаків ховаюсь в нім.`,
      answerImg: "im2.png"
    },
    {
      id: 3,
      audioId: "au3",
      text:
`Живий – чорний,
А як звариться – червоний.`,
      answerImg: "im3.png"
    },
    {
      id: 4,
      audioId: "au4",
      text:
`Крила має, та не літає,
Ніг не має, а гуляє,
По землі не ходить
І людей не знає.`,
      answerImg: "im4.png"
    },
  ];

  const imagesData = [
    { img: "im1.png" },
    { img: "im2.png" },
    { img: "im3.png" },
    { img: "im4.png" },
  ];

  const leftCol = document.getElementById("riddles-left");
  const rightCol = document.getElementById("riddles-right");
  const bankEl = document.getElementById("bank");
  const ok = document.getElementById("ok");
  const no = document.getElementById("no");
  const winMsg = document.getElementById("winMsg");

  const placed = new Map();
  const used = new Set();
  const shuffle = a => [...a].sort(() => 0.5 - Math.random());

  function stopAll(){
    document.querySelectorAll("audio").forEach(a=>{
      try{ a.pause(); a.currentTime = 0; }catch(e){}
    });
  }

  function play(id){
    const a = document.getElementById(id);
    if(!a) return;
    stopAll();
    a.currentTime = 0;
    a.play().catch(()=>{});
  }

  document.addEventListener("click",(e)=>{
    const btn = e.target.closest("[data-a]");
    if(!btn) return;
    play(btn.dataset.a);
  });

  document.getElementById("btnRestart").addEventListener("click", init);

  function init(){
    placed.clear(); used.clear();
    leftCol.innerHTML = "";
    rightCol.innerHTML = "";
    bankEl.innerHTML = "";
    winMsg.style.display = "none";

    const shuffledRiddles = shuffle(riddlesData);

    shuffledRiddles.forEach((r, index) => {
      const card = document.createElement("div");
      card.className = "riddle";
      card.innerHTML = `
        <div class="rtop">
          <button class="snd" data-a="${r.audioId}" title="🔊">🔊</button>
          <div class="rtext">${esc(r.text)}</div>
        </div>
        <div class="drop" data-drop="${r.id}"></div>
      `;
      if(index < 2) leftCol.appendChild(card);
      else rightCol.appendChild(card);
    });

    shuffle(imagesData).forEach(it=>{
      const el = document.createElement("div");
      el.className = "item";
      el.draggable = true;
      el.dataset.img = it.img;
      el.innerHTML = `<img src="${it.img}" alt="">`;

      el.addEventListener("dragstart",(e)=>{
        if(el.classList.contains("used")) return e.preventDefault();
        e.dataTransfer.setData("text/plain", it.img);
      });

      bankEl.appendChild(el);
    });

    document.querySelectorAll(".drop").forEach(zone=>{
      zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
        if(zone.classList.contains("locked")) return;
        zone.classList.add("over");
      });

      zone.addEventListener("dragleave",()=>zone.classList.remove("over"));

      zone.addEventListener("drop",(e)=>{
        e.preventDefault();
        zone.classList.remove("over");
        if(zone.classList.contains("locked")) return;

        const img = e.dataTransfer.getData("text/plain");
        if(!img) return;

        const riddleId = Number(zone.dataset.drop);
        dropTo(riddleId, img, zone);
      });
    });

    // Return to bank
    bankEl.addEventListener("dragover",(e)=>e.preventDefault());
    bankEl.addEventListener("drop",(e)=>{
      e.preventDefault();
      const img = e.dataTransfer.getData("text/plain");
      const from = e.dataTransfer.getData("fromRiddle");
      if(!img || !from) return;

      const rid = Number(from);
      const zone = document.querySelector(`.drop[data-drop="${rid}"]`);
      const chip = zone?.querySelector(".chip");
      if(!zone || (chip && chip.classList.contains("ok"))) return;

      zone.classList.remove("locked");
      zone.innerHTML = "";

      placed.delete(rid);
      used.delete(img);
      markUsed(img, false);
    });
  }

  function dropTo(riddleId, img, zone){
    if(used.has(img)) { pulse(zone); return; }

    const r = riddlesData.find(x=>x.id===riddleId);
    if(!r) return;

    if(placed.has(riddleId)){
      const prev = placed.get(riddleId);
      used.delete(prev);
      markUsed(prev, false);
    }

    zone.innerHTML = "";
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.draggable = true;
    chip.innerHTML = `<img src="${img}" alt="">`;

    chip.addEventListener("dragstart",(e)=>{
      if(chip.classList.contains("ok")) return e.preventDefault();
      e.dataTransfer.setData("text/plain", img);
      e.dataTransfer.setData("fromRiddle", String(riddleId));
    });

    zone.appendChild(chip);

    placed.set(riddleId, img);
    used.add(img);
    markUsed(img, true);

    if(img === r.answerImg){
      chip.classList.add("ok");
      zone.classList.add("locked");
      ok.currentTime = 0; ok.play().catch(()=>{});
      checkWin();
    }else{
      chip.classList.add("bad");
      no.currentTime = 0; no.play().catch(()=>{});
      setTimeout(()=>chip.classList.remove("bad"), 550);
    }
  }

  function checkWin(){
    const solvedCount = document.querySelectorAll(".drop.locked").length;
    if(solvedCount === riddlesData.length){
      setTimeout(()=>{ winMsg.style.display = "flex"; }, 450);
    }
  }

  function markUsed(img, val){
    const el = [...document.querySelectorAll("#bank .item")].find(x=>x.dataset.img===img);
    if(!el) return;
    el.classList.toggle("used", !!val);
  }

  function pulse(el){
    el.style.transition = "0.12s";
    el.style.transform = "translateX(-6px)";
    el.style.borderColor = "rgba(239,68,68,.75)";
    setTimeout(()=>el.style.transform="translateX(6px)", 80);
    setTimeout(()=>{
      el.style.transform="translateX(0)";
      el.style.borderColor="";
    }, 170);
  }

  const esc = s => String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;")
    .replaceAll("\n","<br>");

  init();
</script>
</body>
</html>
