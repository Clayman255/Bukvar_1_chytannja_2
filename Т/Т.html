<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Встав букву</title>
  <style>
    :root{
      --bg:#fbf6ee;
      --card:#fff;
      --accent:#ffd84d;
      --shadow:rgba(0,0,0,.10);
      --text:#2c3e50;
      --line:rgba(44,62,80,.12);
      --good:#22c55e;
      --bad:#ef4444;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:2.09rem; /* -5% */
      font-weight:900;
      text-align:center;
    }

    .task{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      padding:10px 14px;
      border-radius:16px;
      max-width:1200px;
      width:100%;
      margin-bottom:14px;
      font-size:1.2825rem; /* -5% */
      font-weight:800;
      text-align:center;
    }

    .snd{
      border:0;
      background:var(--accent);
      width:42px;
      height:42px;
      border-radius:50%;
      box-shadow:0 4px 10px var(--shadow);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:17.1px; /* -5% */
      flex:0 0 auto;
    }
    .snd:active{transform:scale(.98)}

    /* added: "ще раз" button + success text */
    .again{
      border:0;
      background:rgba(34,197,94,.12);
      color:var(--text);
      border:2px solid rgba(34,197,94,.35);
      padding:8px 12px;
      border-radius:14px;
      font-family: Arial, sans-serif;
      font-weight:900;
      font-size:1.14rem; /* slightly smaller, aligned with -5% */
      cursor:pointer;
      display:none; /* show only when all solved */
      white-space:nowrap;
    }
    .again:active{transform:scale(.98)}

    .doneText{
      display:none; /* show only when all solved */
      font-weight:900;
      color:var(--good);
      font-size:1.14rem; /* -5% vibe */
      white-space:nowrap;
    }

    .wrap{
      width:100%;
      max-width:1200px;
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }

    @media (min-width: 980px){
      .wrap{
        grid-template-columns: 1.25fr .75fr; /* left words | right letters */
        align-items:start;
      }
    }

    /* LEFT: WORDS */
    .words{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      padding:14px;
      display:grid;
      gap:14px;
    }

    .wordRow{
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:18px;
      box-shadow:0 6px 16px rgba(0,0,0,.06);
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .cells{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .cell{
      width:86px;
      height:86px;
      border-radius:18px;
      background:#fff;
      border:3px solid rgba(0,0,0,.10);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.28rem; /* -5% */
      font-weight:900;
      user-select:none;
    }

    .drop{
      border-style:dashed;
      background:rgba(255,216,77,.12);
      transition:.2s;
    }
    .drop.over{border-color:rgba(34,197,94,.65); background:rgba(34,197,94,.10);}
    .drop.locked{border-style:solid; border-color:rgba(34,197,94,.65); background:rgba(34,197,94,.10);}

    .placed{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .placed.bad{animation:shake .45s ease-in-out; color:var(--bad)}
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-8px)}
      75%{transform:translateX(8px)}
    }

    .result{
      font-size:1.995rem; /* -5% */
      font-weight:900;
      letter-spacing:.5px;
      padding:6px 10px;
      border-radius:14px;
      background:rgba(34,197,94,.10);
      border:2px solid rgba(34,197,94,.35);
      display:none;
      white-space:nowrap;
    }

    /* RIGHT: LETTERS (2 columns) */
    .letters{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      padding:14px;
    }

    .lettersGrid{
      display:grid;
      grid-template-columns: 1fr 1fr; /* left column: T | right column: t */
      gap:12px;
      justify-items:center;
      align-items:start;
    }

    .colTitle{
      width:100%;
      text-align:center;
      font-weight:900;
      font-size:1.0925rem; /* -5% */
      opacity:.85;
      margin-bottom:4px;
    }

    .tile{
      width:120px;
      height:90px;
      border-radius:18px;
      background:#fff;
      border:3px solid rgba(0,0,0,.10);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.85rem; /* -5% */
      font-weight:900;
      cursor:grab;
      user-select:none;
      transition:transform .15s;
    }
    .tile:active{cursor:grabbing; transform:scale(.98)}
    .tile.used{opacity:.18; filter:grayscale(1); cursor:default; box-shadow:none; transform:none;}

    .win{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.94);
      z-index:999;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:16px;
      padding:20px;
      text-align:center;
    }
    .win .txt{
      font-size:2.47rem; /* -5% */
      font-weight:1000;
      color:var(--good);
    }
    .btn{
      border:0;
      background:var(--good);
      color:#fff;
      font-size:1.14rem; /* -5% */
      font-weight:900;
      padding:12px 18px;
      border-radius:16px;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(34,197,94,.25);
    }
    .btn:active{transform:scale(.98)}

    @media (max-width: 520px){
      .task{font-size:1.0925rem} /* -5% from 1.15 */
      .cell{width:74px;height:74px;font-size:1.995rem} /* -5% from 2.1 */
      .tile{width:110px;height:84px;font-size:2.66rem} /* -5% from 2.8 */
      .result{font-size:1.71rem} /* -5% from 1.8 */
      .again{font-size:1.05rem}
      .doneText{font-size:1.05rem}
    }
  </style>
</head>

<body>
  <h1>Встав букву</h1>

  <div class="task">
    <button class="snd" data-a="au" title="🔊">🔊</button>

    <!-- added -->
    <button class="again" id="btnAgain" type="button" title="Показати всі складені слова ще раз">Ще раз</button>
    <span class="doneText" id="doneText">Все вдалося!</span>

    <span>Встав пропущену букву "Т" або "т".</span>
  </div>

  <div class="wrap">
    <!-- LEFT: WORDS -->
    <section class="words" id="words"></section>

    <!-- RIGHT: LETTERS -->
    <aside class="letters">
      <div class="lettersGrid" id="lettersGrid"></div>
    </aside>
  </div>

  <div class="win" id="win">
    <div class="txt">Ура! Усі слова складено!</div>
    <button class="btn" id="restart">Зіграти ще раз</button>
  </div>

  <audio id="au" src="au.mp3"></audio>
  <audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
  <audio id="no" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
  // WORDS (left). Each item: cells (letters without the missing one), missing position index, correct letter.
  // Display example: к | і | [drop]  -> then show "кіт"
  const words = [
    // lowercase t correct
    { id: 1, cells: ["к", "і"], missAt: 2, answer: "т", final: "кіт" },
    { id: 2, cells: ["к", "и"], missAt: 2, answer: "т", final: "кит" },
    { id: 3, cells: ["м", "і", "с"], missAt: 3, answer: "т", final: "місто" , tail:"о" },
    { id: 4, cells: ["м", "і", "с"], missAt: 3, answer: "т", final: "міст" },

    // uppercase T correct
    { id: 5, cells: [], missAt: 0, answer: "Т", final: "Тарас", tail:"а р а с" },
    { id: 6, cells: [], missAt: 0, answer: "Т", final: "Тимко", tail:"и м к о" },
    { id: 7, cells: [], missAt: 0, answer: "Т", final: "Тамара", tail:"а м а р а" },
  ];

  // LETTERS (right): 3 big T and 4 small t in two columns
  const lettersPool = [
    { id: "T1", ch: "Т" }, { id: "T2", ch: "Т" }, { id: "T3", ch: "Т" },
    { id: "t1", ch: "т" }, { id: "t2", ch: "т" }, { id: "t3", ch: "т" }, { id: "t4", ch: "т" },
  ];

  const $words = document.getElementById("words");
  const $lettersGrid = document.getElementById("lettersGrid");
  const $win = document.getElementById("win");
  const ok = document.getElementById("ok");
  const no = document.getElementById("no");

  // added
  const $btnAgain = document.getElementById("btnAgain");
  const $doneText = document.getElementById("doneText");

  const placed = new Map(); // wordId -> { ch, letterId }
  const used = new Set();   // letterId

  const shuffle = a => [...a].sort(()=>0.5 - Math.random());

  function stopAll(){
    document.querySelectorAll("audio").forEach(a=>{ try{ a.pause(); a.currentTime=0; }catch(e){} });
  }
  function play(id){
    const a = document.getElementById(id);
    if(!a) return;
    stopAll();
    a.currentTime = 0;
    a.play().catch(()=>{});
  }
  document.addEventListener("click",(e)=>{
    const btn = e.target.closest("[data-a]");
    if(!btn) return;
    play(btn.dataset.a);
  });

  document.getElementById("restart").addEventListener("click", init);

  // added: show all completed words again (hide cells -> show result)
  $btnAgain.addEventListener("click", ()=>{
    words.forEach(w=>{
      const row = document.querySelector(`.wordRow[data-word-id="${cssEscape(w.id)}"]`);
      if(!row) return;
      const cells = row.querySelector(".cells");
      const res = row.querySelector(".result");
      if(cells && res){
        cells.style.display = "none";
        res.style.display = "block";
      }
    });
  });

  function init(){
    placed.clear(); used.clear();
    $win.style.display = "none";

    // added: hide top success UI
    $btnAgain.style.display = "none";
    $doneText.style.display = "none";

    $words.innerHTML = "";
    $lettersGrid.innerHTML = "";

    // --- render words ---
    words.forEach(w=>{
      const row = document.createElement("div");
      row.className = "wordRow";
      row.dataset.wordId = w.id;

      const cellsWrap = document.createElement("div");
      cellsWrap.className = "cells";

      // Build visual cells: letters + drop + optional tail letters as separate cells
      const leftLetters = [...(w.cells || [])];
      const tailLetters = w.tail ? w.tail.split(" ").filter(Boolean) : [];

      const allBefore = [];
      const allAfter = [];

      leftLetters.forEach(ch => allBefore.push({type:"letter", ch}));
      allBefore.push({type:"drop"});
      tailLetters.forEach(ch => allBefore.push({type:"letter", ch}));

      allBefore.forEach((item)=>{
        if(item.type === "letter"){
          const c = document.createElement("div");
          c.className = "cell";
          c.textContent = item.ch;
          cellsWrap.appendChild(c);
        } else {
          const z = document.createElement("div");
          z.className = "cell drop";
          z.dataset.word = w.id;
          cellsWrap.appendChild(z);
        }
      });

      const res = document.createElement("div");
      res.className = "result";
      res.textContent = w.final;

      row.appendChild(cellsWrap);
      row.appendChild(res);

      $words.appendChild(row);
    });

    // --- render letters (two columns) ---
    const big = shuffle(lettersPool.filter(x=>x.ch==="Т"));
    const small = shuffle(lettersPool.filter(x=>x.ch==="т"));
    const rows = Math.max(big.length, small.length);

    // headers
    const h1 = document.createElement("div");
    h1.className = "colTitle";
    h1.textContent = "Т";
    const h2 = document.createElement("div");
    h2.className = "colTitle";
    h2.textContent = "т";
    $lettersGrid.appendChild(h1);
    $lettersGrid.appendChild(h2);

    for(let i=0;i<rows;i++){
      $lettersGrid.appendChild(big[i] ? makeTile(big[i]) : spacer());
      $lettersGrid.appendChild(small[i] ? makeTile(small[i]) : spacer());
    }

    // activate drops
    document.querySelectorAll(".drop").forEach(zone=>{
      zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
        if(zone.classList.contains("locked")) return;
        zone.classList.add("over");
      });
      zone.addEventListener("dragleave",()=>zone.classList.remove("over"));
      zone.addEventListener("drop",(e)=>{
        e.preventDefault();
        zone.classList.remove("over");
        if(zone.classList.contains("locked")) return;

        const letterId = e.dataTransfer.getData("letterId");
        const ch = e.dataTransfer.getData("ch");
        if(!letterId || !ch) return;

        const wordId = Number(zone.dataset.word);
        dropTo(zone, wordId, letterId, ch);
      });
    });
  }

  function makeTile(l){
    const el = document.createElement("div");
    el.className = "tile";
    el.textContent = l.ch;
    el.draggable = true;
    el.dataset.letterId = l.id;
    el.dataset.ch = l.ch;

    el.addEventListener("dragstart",(e)=>{
      if(el.classList.contains("used")) return e.preventDefault();
      e.dataTransfer.setData("letterId", l.id);
      e.dataTransfer.setData("ch", l.ch);
    });

    return el;
  }

  function spacer(){
    const s = document.createElement("div");
    s.style.width = "120px";
    s.style.height = "90px";
    s.style.opacity = "0";
    return s;
  }

  function dropTo(zone, wordId, letterId, ch){
    if(used.has(letterId)) return;

    const w = words.find(x=>x.id===wordId);
    if(!w) return;

    // if already placed here, return old letter
    if(placed.has(wordId)){
      const prev = placed.get(wordId);
      used.delete(prev.letterId);
      const prevTile = document.querySelector(`.tile[data-letter-id="${cssEscape(prev.letterId)}"]`);
      if(prevTile) prevTile.classList.remove("used");

      // reset visuals for this word
      zone.classList.remove("locked");
      zone.innerHTML = "";
      const row = document.querySelector(`.wordRow[data-word-id="${cssEscape(wordId)}"]`);
      row?.querySelector(".result")?.style && (row.querySelector(".result").style.display="none");
      row?.querySelectorAll(".cell").forEach(c=>{
        if(c.classList.contains("cell") && !c.classList.contains("drop")) c.style.display="";
      });
    }

    // place
    zone.innerHTML = "";
    const p = document.createElement("div");
    p.className = "placed";
    p.textContent = ch;
    zone.appendChild(p);

    used.add(letterId);
    const tile = document.querySelector(`.tile[data-letter-id="${cssEscape(letterId)}"]`);
    tile?.classList.add("used");

    placed.set(wordId, { ch, letterId });

    // check
    if(ch === w.answer){
      zone.classList.add("locked");
      ok.currentTime=0; ok.play().catch(()=>{});

      // show joined word (hide squares, show final)
      const row = document.querySelector(`.wordRow[data-word-id="${cssEscape(wordId)}"]`);
      if(row){
        row.querySelector(".cells").style.display = "none";
        const res = row.querySelector(".result");
        res.style.display = "block";
      }

      checkWin();
    }else{
      p.classList.add("bad");
      no.currentTime=0; no.play().catch(()=>{});
      setTimeout(()=>p.classList.remove("bad"), 520);
    }
  }

  function checkWin(){
    const locked = document.querySelectorAll(".drop.locked").length;
    if(locked === words.length){
      setTimeout(()=>{
        $win.style.display = "flex";
        // added: show top "Ще раз" + "Все вдалося!"
        $btnAgain.style.display = "inline-flex";
        $doneText.style.display = "inline";
      }, 450);
    }
  }

  function cssEscape(v){
    if(window.CSS && CSS.escape) return CSS.escape(String(v));
    return String(v).replace(/[^a-zA-Z0-9\-_]/g, "\\$&");
  }

  init();
</script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
